services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gynassist-backend
    ports:
      - "8081:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS}
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL}
        - VITE_FIREBASE_API_KEY=${VITE_FIREBASE_API_KEY}
    container_name: gynassist-frontend
    ports:
      - "8082:80" # Cambiamos el puerto de la izquierda (VPS) al 8082
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    restart: always
    depends_on:
      - backend
