services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gynassist-backend
    ports:
      - "8080:8080"
    # ... otras configuraciones del backend
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gynassist-frontend
    ports:
      - "80:80"
    restart: always
    depends_on:
      - backend
